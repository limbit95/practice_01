<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="EUC-KR">
<title>Post List Page</title>
</head>
<script th:inline="javascript">
	const message = /*[[${message}]]*/ "";
	if(message !== "" && message != null) {
		alert(message);
	}

	<div th:each="item : ${postList}">

	</div>
	
	<br>
	
    <a href="/">Main Page</a>
    
</body>
</html>
